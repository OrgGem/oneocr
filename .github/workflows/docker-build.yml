name: Docker Build Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker image
      run: |
        docker build -t oneocr:test .
        
    - name: Verify Docker image
      run: |
        docker images | grep oneocr
        docker inspect oneocr:test
        
    - name: Check image size
      run: |
        size=$(docker images oneocr:test --format "{{.Size}}")
        echo "Image size: $size"
        
    - name: Test Docker image structure
      run: |
        # Test that required files exist in the image
        docker run --rm oneocr:test ls -la /app/
        docker run --rm oneocr:test python3 --version
        docker run --rm oneocr:test wine64 --version
        docker run --rm oneocr:test test -f /app/oneocr.py && echo "oneocr.py exists"
        docker run --rm oneocr:test test -f /app/start.sh && echo "start.sh exists"
        
    - name: Test Python imports
      run: |
        docker run --rm oneocr:test python3 -c "import oneocr; print('oneocr module imported successfully')"
